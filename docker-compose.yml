services:
  db:
    image: postgres:15-alpine
    container_name: steam_postgres
    environment:
      POSTGRES_DB: steam_db
      POSTGRES_USER: steamuser
      POSTGRES_PASSWORD: steampass123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U steamuser -d steam_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: steam_django
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  nginx:
    build: ./nginx
    container_name: steam_nginx
    ports:
      - "80:80"
    volumes:
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
    depends_on:
      - web

volumes:
  postgres_data:
