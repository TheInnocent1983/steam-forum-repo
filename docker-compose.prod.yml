services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: steam-forum-repo-web-1
    env_file:
      - .env
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - ./.env:/app/.env
    depends_on:
      - db
    networks:
      - app_network
    ports:
      - "8000:8000"
    command: python manage.py runserver 0.0.0.0:8000

  db:
    image: postgres:15-alpine
    container_name: steam-forum-repo-db-1
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network

  nginx:
    build: ./nginx
    container_name: steam-forum-repo-nginx-1
    ports:
      - "80:80"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - web
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
  static_volume:
  media_volume:
