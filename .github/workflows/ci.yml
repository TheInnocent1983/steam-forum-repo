name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      IMAGE: theinnocent/steam_forum
      # Requirement 4: Tag with commit SHA
      TAG: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # Requirement 1: Code quality checks
      - name: Lint with flake8
        run: |
          python -m pip install flake8
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=119 --statistics --exclude=migrations,venv

      # Requirement 2: Run tests (pytest-django)
      - name: Run tests
        run: |
          python -m pip install -r requirements.txt
          python -m pip install pytest pytest-django
          PYTHONPATH=. pytest

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Requirement 3 & 4: Build and tag image appropriately
      - name: Build Docker image
        run: |
          docker build -t $IMAGE:latest -t $IMAGE:$TAG .

      # Requirement 5: Push image to Docker Hub
      - name: Push Docker image
        run: |
          docker push $IMAGE:latest
          docker push $IMAGE:$TAG

      # Requirement 6: Deploy via SSH
      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v0.1.9
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/steam-forum-repo
            # Requirement: Pull latest images
            docker-compose pull
            # Requirement 8: Restart services (down/up for clean state)
            docker-compose down
            docker-compose up -d
            # Requirement 7: Run database migrations automatically
            docker-compose exec -T web python manage.py migrate --noinput
            # Requirement: Collect static files
            docker-compose exec -T web python manage.py collectstatic --noinput
