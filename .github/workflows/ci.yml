name: CI/CD Pipeline
 
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      IMAGE: theinnocent/steam_forum
      TAG: ${{ github.sha }} # Requirement: Tag image with commit SHA
      # Environment variables for the test environment
      SECRET_KEY: "temporary-key-for-testing"
      DEBUG: "True"
      ALLOWED_HOSTS: "localhost,127.0.0.1"

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # Requirement: Code quality checks
      - name: Lint with flake8
        run: |
          python -m pip install flake8
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=119 --statistics --exclude=migrations,venv

      # Requirement: Run tests (pytest-django with at least 5 tests)
      - name: Run tests
        run: |
          python -m pip install -r requirements.txt
          python -m pip install pytest pytest-django
          DJANGO_SETTINGS_MODULE=config.settings PYTHONPATH=. pytest

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Requirement: Build and tag Docker image
      - name: Build and Tag image
        run: |
          docker build -t $IMAGE:latest -t $IMAGE:$TAG .

      # Requirement: Push image to Docker Hub
      - name: Push image
        run: |
          docker push $IMAGE:latest
          docker push $IMAGE:$TAG

      # Requirement: Deploy to Azure server via SSH
      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v0.1.9
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/steam-forum-repo
            docker-compose pull
            docker-compose up -d --build
            # Requirement: Run database migrations automatically
            docker-compose exec -T web python manage.py migrate --noinput
            # Requirement: Collect static files
            docker-compose exec -T web python manage.py collectstatic --noinput
