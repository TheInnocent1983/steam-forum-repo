name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      IMAGE: theinnocent/steam_forum:latest
      # Dummy secret for testing; actual secrets remain in .env on the server
      SECRET_KEY: "ci-test-key"
      DEBUG: "True"

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-with: '3.11'

      # 1. Linting - We ignore migrations and long lines to avoid petty failures
      - name: Lint with flake8
        run: |
          python -m pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=119 --statistics --exclude=migrations,venv

      # 2. Testing - Pointing to the root instead of the missing /tests folder
      - name: Run Django tests
        run: |
          python -m pip install -r requirements.txt
          pip install pytest pytest-django
          # Use the root directory so pytest finds forum/tests.py
          pytest .

      # 3. Docker build/push (Only happens if tests pass)
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t $IMAGE .

      - name: Push Docker image
        run: docker push $IMAGE

      # 4. Azure Deployment
      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v0.1.9
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/steam-forum-repo
            # Ensure your deploy.sh uses the image we just pushed
            docker compose pull
            docker compose up -d
