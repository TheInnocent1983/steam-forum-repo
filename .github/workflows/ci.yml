name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      IMAGE: theinnocent/steam_forum:latest

    steps:
      - uses: actions/checkout@v3

      # Keep this to ensure your code stays clean for your coursework
      - name: Lint with flake8
        run: |
          python -m pip install flake8
          # This specifically ignores migrations and the unused import that failed before
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=119 --statistics --exclude=migrations,venv

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t $IMAGE .

      - name: Push Docker image
        run: docker push $IMAGE

      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v0.1.9
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/steam-forum-repo
            # This triggers your deployment on the server
            docker-compose pull
            docker-compose up -d
